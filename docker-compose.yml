services:
  postgres:
    image: postgres:16-alpine
    container_name: docgen-postgres
    environment:
      POSTGRES_DB: docgen
      POSTGRES_USER: docgen
      POSTGRES_PASSWORD: docgen
    ports:
      - "5432:5432"
    volumes:
      - docgen-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docgen -d docgen"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Optional cache — the backend uses Redis for prefill rate limiting if reachable,
  # otherwise it transparently falls back to an in-memory limiter.
  redis:
    image: redis:7-alpine
    container_name: docgen-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  docgen-pgdata:
